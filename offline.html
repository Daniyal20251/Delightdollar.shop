<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delight PK - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff6b00, #ff8c00);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 16px; opacity: 0.85; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: white;
      color: #ff6b00;
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="icon">📶</div>
  <h1>Internet Nahi Hai</h1>
  <p>Aapka internet connection check karo aur dobara try karo۔</p>
  <button onclick="window.location.reload()">🔄 Dobara Try Karo</button>
</body>
</html>
