<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="S login.css">
  <title>www.delight.pk - Login</title>
 
</head>
<body>

  <div class="delight">
    <h2>Welcome Back 👋</h2>
    <h2>TO</h2>
    <h1 id="welcomeTitle">DELIGHT SHOP🛍</h1>
  </div>

  <!-- 🔥 Store Logo Dynamic -->
  <div class="store-info" id="storeInfo" style="margin-bottom:40px;">
    <img id="storeLogo" src="Delight icons/Logo.png" alt="Store Logo">
  </div>

  <div class="login">
    <h3>Login</h3>

    <form id="loginForm">
      <input type="number" id="phone" required placeholder="Enter your phone number" minlength="11" maxlength="11"><br>
      
      <!-- 🔥 Password with Eye Toggle -->
      <div class="password-wrapper">
        <input type="password" id="pass" required placeholder="Enter your password" minlength="6">
        <span class="toggle-password" onclick="togglePassword()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div><br>
      
      <input type="submit" value="Login">
    </form>

    <p style="margin-top:12px; font-size:13px; text-align:center;">
      Don't have an account?
      <a href="#" id="signupLink" style="color:#ef6c00; text-decoration:none; font-weight:bold;">✍️ Sign Up</a>
    </p>
  </div>

  <script>
    // 🔥 PASSWORD TOGGLE FUNCTION
    function togglePassword() {
      const passInput = document.getElementById("pass");
      const eyeIcon = document.getElementById("eyeIcon");
      
      if (passInput.type === "password") {
        passInput.type = "text";
        // Eye-off icon
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        passInput.type = "password";
        // Eye icon
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }

    // 🔥 GET STORE PHONE FROM URL
    const urlParams = new URLSearchParams(window.location.search);
    const sellerPhone = urlParams.get("phone");

    // 🔥 LOAD STORE INFO (Logo + Name)
    async function loadStoreInfo() {
      if (!sellerPhone) return;
      
      try {
        const res = await fetch("https://delight-backend--araindaniyalo2.replit.app/all-stores");
        const allStores = await res.json();
        const store = allStores.find(s => s.phone === sellerPhone);
        
        if (store) {
          document.getElementById("welcomeTitle").textContent = (store.name || "STORE") + "🛍";
          if (store.logo) {
            document.getElementById("storeLogo").src = store.logo;
          }
        }
      } catch (err) {
        console.error("Error loading store info:", err);
      }
    }

    // 🔥 FIX SIGNUP LINK WITH STORE PHONE
    function fixLinks() {
      if (sellerPhone) {
        document.getElementById("signupLink").href = `Stores Signup.html?phone=${sellerPhone}`;
      } else {
        document.getElementById("signupLink").href = "signup.html";
      }
    }

    // Login Form
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async function(event){
      event.preventDefault();

      const phone = document.getElementById("phone").value.trim();
      const pass = document.getElementById("pass").value.trim();

      if (phone.length !== 11 || pass.length < 6) {
        alert("⚠️ Please enter valid phone and password!");
        return;
      }

      const payload = { phone, password: pass };

      try {
        const baseUrl = "https://delight-backend--araindaniyalo2.replit.app"; 
        const res = await fetch(baseUrl + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem("customer", JSON.stringify({
            id: data.user.id,
            name: data.user.name,
            phone: data.user.phone
          }));
          
          if (sellerPhone) {
            window.location.href = `Profile Stores.html?phone=${sellerPhone}`;
          } else {
            window.location.href = "profile.html";
          }
          return;
        } else {
          alert(data.message || "Login failed. Check credentials.");
        }
      } catch (err) {
        console.warn("⚠️ Backend offline → Using localStorage fallback");

        const local = JSON.parse(localStorage.getItem("customer"));
        if (local && local.phone === phone) {
          if (sellerPhone) {
            window.location.href = `Profile Stores.html?phone=${sellerPhone}`;
          } else {
            window.location.href = "profile.html";
          }
        } else {
          alert("⚠️ User not found locally. Please signup.");
        }
      }
    });

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      loadStoreInfo();
      fixLinks();
    });
  </script>

</body>
</html>
