<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Profile.css">
  <meta name="theme-color" content="#ff6b00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DelightPK">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
  <title>My Profile</title>
</head>
<body>
  <header>
  <p>My Account</p>
  <div class="bar">
    <a href="index.html"><img src="Delight icons/Back.png" width="30" height="20" class="logo"></a>
  </div>
  </header>

  <!-- Login / Signup Buttons -->
  <div id="authButtons">
    <a href="login.html" class="btn1"><button>Login</button></a>
    <a href="signup.html" class="btn2"><button>Sign Up</button></a>
  </div>

  <!-- Welcome Text -->
  <h2 id="welcomeText" style="display:none; color:#f38300; text-align:center;">Loading...</h2>

  <!-- Logout Button -->
  <div class="btn">
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>

  <!-- My Orders -->
  <div id="myOrders" class="od" style="display:none;">
    <a href="myorders.html" style="text-decoration:none; font-weight:bold; color:#ef6c00;">
      🧾 My Orders
    </a>
  </div>

  <!-- Always Visible Links -->
  <div class="od"><a href="Help.html">❓ Help Center</a></div>
  <div class="od"><a href="Settings.html" style="color:#ef6c00;">⚙ Settings</a></div>
  <div class="od"><a href="privacy.html" style="color:#ef6c00;">🔒 Privacy Policy</a></div>
  <div class="od"><a href="terms.html" style="color:#ef6c00;">📜 Terms & Conditions</a></div>

  <script>
    // ✅ Get customer info from localStorage
    const customer = JSON.parse(localStorage.getItem("customer"));
    const name = customer ? customer.name : null;

    if (name) {
      // Hide login/signup buttons
      document.getElementById("authButtons").style.display = "none";

      // Show welcome text
      document.getElementById("welcomeText").style.display = "block";
      document.getElementById("welcomeText").innerText = "Hello, " + name + " 👋";

      // Show logout button
      document.getElementById("logoutBtn").style.display = "inline-block";

      // Show My Orders
      document.getElementById("myOrders").style.display = "block";
    }

    function logout() {
      localStorage.removeItem("customer");
      window.location.reload();
    }
  </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
