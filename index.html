<!DOCTYPE html>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://delightpk.shop/">

  <meta property="og:site_name" content="Delightpk">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Delightpk - Online Shopping in Pakistan">
  <meta name="twitter:description" content="Find products you love with fast delivery across Pakistan.">
  <meta name="twitter:image" content="https://delightpk.shop/Delightpk.png">
  
  <meta name="theme-color" content="#ff6b00">
  
  <!-- Schema: Website -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Delightpk",
    "url": "https://delightpk.shop/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://delightpk.shop/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  
  <!-- Schema: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Delightpk",
    "url": "https://delightpk.shop/",
    "logo": "https://delightpk.shop/Delightpk.png",
    "sameAs": [
      "https://facebook.com/delightpk",
      "https://instagram.com/delightpk"
    ]
  }
  </script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="main-header">
    <div class="header-left">
      <div class="logo-wrap">
        <img src="Delight icons/Delightpk.png" width="36" height="36" alt="logo">
      </div>
      <h1 class="brand-name">Delight<span>pk</span></h1>
    </div>
    <div class="header-right">
      <div class="search-wrap" id="searchWrap">
        <div class="search-input-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
          <button class="search-clear-btn" id="searchClearBtn" style="display:none;"><i class="fas fa-times"></i></button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== SEARCH SUGGESTIONS DROPDOWN ===== -->
  <div id="suggestionsDropdown" class="suggestions-dropdown" style="display:none;"></div>

  <!-- ===== SEARCH PANEL (Recent + Popular) ===== -->
  <div id="searchPanel" class="search-panel">
    <div class="panel-header">
      <span class="recent-title"><i class="fas fa-history"></i> Recent Searches</span>
      <button id="clearHistoryBtn" class="clear-btn">Clear All</button>
    </div>
    <ul id="recentSearches"></ul>
    <div class="popular-section">
      <p class="popular-label"><i class="fas fa-fire"></i> Popular</p>
      <div class="popular-chips">
        <span onclick="fillAndSearch('Tripod')">Tripod Stand</span>
        <span onclick="fillAndSearch('Wall Clock')">Wall Clock</span>
        <span onclick="fillAndSearch('Gripper')">Gripper</span>
        <span onclick="fillAndSearch('Smart Watch')">Smart Watch</span>
        <span onclick="fillAndSearch('Earbuds')">Earbuds</span>
        <span onclick="fillAndSearch('Power Bank')">Power Bank</span>
      </div>
    </div>
  </div>

  <div style="height: 64px;"></div>

  <!-- ===== TAB BAR ===== -->
  <div class="tab-bar">
    <div class="tab active" onclick="setActiveTab(this, 'index.html')">All Items</div>
    <div class="tab" onclick="setActiveTab(this, 'Delightstore.html')">Shops</div>
    <div class="underline"></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bar">
    <a href="index.html" class="active">
      <img src="Delight icons/Home.png" width="22" height="22" alt="Home">
      <span>Home</span>
    </a>
    <a href="Categories.html">
      <img src="Delight icons/Categories.png" width="22" height="22" alt="Categories">
      <span>Categories</span>
    </a>
    <a href="cart.html">
      <img src="Delight icons/Cart.png" width="22" height="22" alt="Cart">
      <span>Cart</span>
    </a>
    <a href="profile.html">
      <img src="Delight icons/Profile.png" width="22" height="22" alt="Profile">
      <span>Profile</span>
    </a>
  </nav>

  <!-- ===== ADS SKELETON ===== -->
  <div id="adsSkeleton" class="ads-skeleton">
    <div class="skeleton-ad shimmer"></div>
  </div>

  <!-- ===== SWIPER ADS SLIDER ===== -->
  <div class="swiper mySwiper" id="adSlider" style="display:none;">
    <div class="swiper-wrapper" id="swiperWrapper">
      <div class="swiper-slide" id="ad1"><img src="" alt="Ad 1" loading="lazy"></div>
      <div class="swiper-slide" id="ad2"><img src="" alt="Ad 2" loading="lazy"></div>
      <div class="swiper-slide" id="ad3"><img src="" alt="Ad 3" loading="lazy"></div>
      <div class="swiper-slide" id="ad4"><img src="" alt="Ad 4" loading="lazy"></div>
      <div class="swiper-slide" id="ad5"><img src="" alt="Ad 5" loading="lazy"></div>
      <div class="swiper-slide" id="ad6"><img src="" alt="Ad 6" loading="lazy"></div>
      <div class="swiper-slide" id="ad7"><img src="" alt="Ad 7" loading="lazy"></div>
      <div class="swiper-slide" id="ad8"><img src="" alt="Ad 8" loading="lazy"></div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <!-- ===== FLASH SALE SECTION ===== -->
  <div class="section-block" id="flashSaleBox" style="display:none;">
    <div class="section-header">
      <div class="section-title flash-title">
        <span class="fire-icon">🔥</span> Flash Sale
        <span class="live-badge">LIVE</span>
      </div>
      <a class="see-all-btn" href="#">See All</a>
    </div>
    <div id="flashSaleContainer" class="flash-sale-grid"></div>
  </div>

  <!-- ===== RECENTLY VIEWED SECTION ===== -->
  <div class="section-block" id="recentlyViewedBox" style="display:none;">
    <div class="section-header">
      <div class="section-title recently-title">
        <span>👀️</span> Recently Viewed
      </div>
    </div>
    <div id="recentlyViewedContainer" class="flash-sale-grid"></div>
  </div>

  <!-- ===== PRODUCTS SKELETON ===== -->
  <div id="skeletonContainer" class="skeleton-container">
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
    <div class="skeleton-card"><div class="skeleton-img shimmer"></div><div class="skeleton-title shimmer"></div><div class="skeleton-price shimmer"></div></div>
  </div>

  <div class="products-section-header" id="allProductsHeader" style="display:none;">
    <div class="section-title"><span>🛍️</span> All Products</div>
  </div>
  <div id="itemContainer" class="container" style="display:none;"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
