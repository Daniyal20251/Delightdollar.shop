      if (sellerPhone) {

        document.getElementById("categoriesLink").href = `Categories Stores.html?phone=${sellerPhone}`;

  "Other Things": "Category icons/other.png"
};

const urlParams = new URLSearchParams(window.location.search);
const sellerPhone = urlParams.get("phone");

async function loadStoreInfo() {
  if (!sellerPhone) return;
  
  try {
    const res = await fetch("https://delight-backend--araindaniyalo2.replit.app/all-stores");
    const allStores = await res.json();
    const store = allStores.find(s => s.phone === sellerPhone);
    
    if (store) {
      document.getElementById("storeName").textContent = store.name || "DELIGHT.PK";
      if (store.logo) {
        document.getElementById("storeLogo").src = store.logo;
      }
    }
  } catch (err) {
    console.error("Error loading store info:", err);
  }
}

function fixNavigation() {
  if (!sellerPhone) return;
  
  document.getElementById("homeLink").href = `Store.html?phone=${sellerPhone}`;
  document.getElementById("categoriesLink").href = `Categories Stores.html?phone=${sellerPhone}`;
  document.getElementById("cartLink").href = `Cart Stores.html?phone=${sellerPhone}`;
  document.getElementById("profileLink").href = `Profile Stores.html?phone=${sellerPhone}`;
}

function showSubcategories(catName) {
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <h2>${catName}</h2>
    <div class="sub-grid">
      ${categories[catName]
        .map(sub => `
          <div class="sub-item" data-value="${catName} - ${sub}">
            <img src="${subcategoryIcons[sub] || 'Category icons/default.png'}" alt="${sub}">
            <span>${sub}</span>
          </div>
        `)
        .join("")}
    </div>
  `;

  document.querySelectorAll('.sub-item').forEach(el => {
    el.addEventListener('click', () => {
      const selectedCategory = el.dataset.value;
      window.location.href = `Category Results Stores.html?category=${encodeURIComponent(selectedCategory)}&phone=${sellerPhone}`;
    });
  });
}

document.querySelectorAll('.sidebar-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    showSubcategories(btn.dataset.cat);
  });
});

document.addEventListener("DOMContentLoaded", () => {
  loadStoreInfo();
  fixNavigation();
  showSubcategories("Men Fashion");
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
